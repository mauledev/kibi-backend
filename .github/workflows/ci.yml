name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  quality:
    name: Lint, type-check, test & build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: kibi_db_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: testing
      APP_KEY: base64:J7xK3hN8mP2qL5rT9vW1yZ4aB6cD9eF2gH5iJ8kL1nO4pQ7sT0uV3wX6yZ9aC2bD5e
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: kibi_db_test
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_pgsql, mbstring, bcmath, pcov
          coverage: pcov

      - name: Cache vendor
        id: cache-vendor
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare Laravel cache directory
        run: mkdir -p bootstrap/cache

      - name: Format check (Pint)
        run: composer format:test

      - name: Static analysis (Larastan)
        run: composer analyse

      - name: Tests with coverage (Pest)
        run: php vendor/bin/pest --coverage-text --coverage-clover coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
