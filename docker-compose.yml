version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: school-admin-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php.ini:/usr/local/etc/php/php.ini:ro
    networks:
      - school-admin-network
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: school_admin
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      APP_KEY: base64:J7xK3hN8mP2qL5rT9vW1yZ4aB6cD9eF2gH5iJ8kL1nO4pQ7sT0uV3wX6yZ9aC2bD5e

  nginx:
    image: nginx:latest
    container_name: school-admin-nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - school-admin-network
    depends_on:
      - app

  postgres:
    image: postgres:15-alpine
    container_name: school-admin-postgres
    environment:
      POSTGRES_DB: school_admin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - school-admin-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  school-admin-network:
    driver: bridge

volumes:
  postgres_data:
